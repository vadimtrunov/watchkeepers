extends: default

ignore: |
  node_modules/
  dist/
  coverage/
  .claude/
  .omc/
  pnpm-lock.yaml

rules:
  line-length:
    max: 160
    level: warning
  document-start:
    present: false
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: consistent
  comments:
    min-spaces-from-content: 1
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
