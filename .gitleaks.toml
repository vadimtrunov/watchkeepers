# Watchkeeper gitleaks configuration.
# Extends the bundled default ruleset; project-specific allowlists go here.
#
# Upstream baseline: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Project-wide allowlist — paths and patterns that must never trigger a finding."
paths = [
  '''(?i)\.gitleaks\.toml$''',
]
regexes = [
  # Explicit example tokens in docs. Keep narrow — no broad prefixes like "test"
  # that could mask real leaks.
  '''EXAMPLE[_-]?(API|ACCESS)[_-]?KEY[_-]?[A-Z0-9]{8,}''',
  '''dummy[_-]?secret[_-]?[A-Za-z0-9_-]{6,}''',
]

# Document-friendly override: release notes and ADRs can quote sample tokens
# so long as the sample prefix clearly marks them as non-credentials.
[[rules]]
id = "generic-placeholder-token"
description = "Exempt obviously fake example tokens from the generic-api-key rule."
regex = '''(?i)EXAMPLE[_-]?(API|ACCESS)[_-]?KEY[_-]?[A-Z0-9]{8,}'''
tags = ["placeholder"]
entropy = 0
