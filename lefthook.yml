# Watchkeeper — pre-commit & commit-msg hooks.
# Mirrors the CI matrix so local and CI gates are identical.
# See docs/ROADMAP-phase1.md cross-cutting constraint "CI/pre-commit parity".

min_version: 1.7.0

assert_lefthook_installed: true

pre-commit:
  parallel: true
  jobs:
    - name: gitleaks
      run: gitleaks protect --staged --redact --config .gitleaks.toml

    - name: gofumpt
      glob: "*.go"
      run: |
        set -euo pipefail
        go run mvdan.cc/gofumpt@latest -l -w {staged_files}
        git add {staged_files}

    - name: golangci-lint
      glob: "*.go"
      run: golangci-lint run --new-from-rev HEAD --fix {staged_files}
      stage_fixed: true

    - name: prettier
      glob:
        - "*.{ts,tsx,js,mjs,cjs,json,jsonc,md,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob:
        - "*.{ts,tsx}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

    - name: markdownlint
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 --config .markdownlint-cli2.jsonc {staged_files}

    - name: yamllint
      glob:
        - "*.{yml,yaml}"
      run: yamllint {staged_files}

    - name: shellcheck
      glob: "*.sh"
      run: shellcheck {staged_files}

    - name: hadolint
      glob:
        - "Dockerfile"
        - "Dockerfile.*"
        - "**/Dockerfile"
      run: hadolint {staged_files}

    - name: sqlfluff
      glob:
        - "deploy/migrations/*.sql"
      run: sqlfluff lint {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

# License scan is project-wide — runs on push, not per-staged-file —
# keeping parity with the security-ci job without slowing pre-commit.
pre-push:
  parallel: true
  jobs:
    - name: license-scan
      run: make license-scan
