# Watchkeeper — pre-commit & commit-msg hooks.
# Mirrors the CI matrix so local and CI gates are identical.
# See docs/ROADMAP-phase1.md cross-cutting constraint "CI/pre-commit parity".

min_version: 1.7.0

assert_lefthook_installed: true

pre-commit:
  parallel: true
  jobs:
    # Tools that touch disjoint file sets may run in parallel.
    - name: gitleaks
      run: gitleaks protect --staged --redact --config .gitleaks.toml

    - name: markdownlint
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 --config .markdownlint-cli2.jsonc {staged_files}

    - name: yamllint
      glob:
        - "*.{yml,yaml}"
      run: yamllint {staged_files}

    - name: shellcheck
      glob: "*.sh"
      run: shellcheck {staged_files}

    - name: hadolint
      glob:
        - "Dockerfile"
        - "Dockerfile.*"
        - "**/Dockerfile"
      run: hadolint {staged_files}

    - name: sqlfluff
      glob:
        - "deploy/migrations/*.sql"
      run: sqlfluff lint {staged_files}
      # No pre-commit hook for the `migrate-*` make targets: they need a
      # reachable Postgres and therefore live only in the Migrate CI
      # workflow job and `make migrate-*` invoked by hand. See the
      # "Migrations" section of docs/DEVELOPING.md.

    # Same-file tools run sequentially inside one job so the formatter's writes
    # and the linter's --fix don't race on git's index lock or overwrite each
    # other. Lefthook >= v2.1 serialises stage_fixed `git add` calls via a
    # mutex, but combining here also avoids the formatter re-running after the
    # linter stages its fixes.

    - name: go-fmt-lint
      glob: "*.go"
      run: |
        set -euo pipefail
        go run mvdan.cc/gofumpt@latest -l -w {staged_files}
        golangci-lint run --new-from-rev HEAD --fix {staged_files}
      stage_fixed: true

    - name: ts-fmt-lint
      glob:
        - "*.{ts,tsx}"
      run: |
        set -euo pipefail
        pnpm exec prettier --write {staged_files}
        pnpm exec eslint --fix {staged_files}
      stage_fixed: true

    # Prettier-only targets (non-TypeScript) run independently since eslint
    # doesn't touch them.
    - name: prettier-misc
      glob:
        - "*.{js,mjs,cjs,json,jsonc,yml,yaml,md}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

# License scan is project-wide — runs on push, not per-staged-file —
# keeping parity with the security-ci job without slowing pre-commit.
pre-push:
  parallel: true
  jobs:
    - name: license-scan
      run: make license-scan
