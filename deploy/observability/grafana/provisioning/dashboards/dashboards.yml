# Provisioned dashboard provider for the Phase 1 compose stack (M10.3).
#
# Grafana loads this file at boot via the file-provider in
# /etc/grafana/provisioning/dashboards/. The provider scans the
# `path:` directory for `*.json` and registers each as a managed
# dashboard. Mounted read-only by the `grafana` service in
# docker-compose.yml.
apiVersion: 1

providers:
  - name: Watchkeeper Phase 1
    orgId: 1
    folder: ""
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
