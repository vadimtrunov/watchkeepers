version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - depguard
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - noctx
    - revive
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    gosec:
      excludes:
        - G115
    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - "!**/*_test.go"
          deny:
            - pkg: "io/ioutil"
              desc: deprecated since Go 1.16; use io and os
            - pkg: "github.com/pkg/errors"
              desc: use stdlib errors + fmt.Errorf with %w
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/vadimtrunov/watchkeepers

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
