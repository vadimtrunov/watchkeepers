name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "24.15.0"
  PNPM_VERSION: "10.33.0"

jobs:
  go-ci:
    name: Go CI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.mod
        run: go mod verify

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/ ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Test with race detector and coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          printf "Go coverage: %s%%\n" "$coverage"
          awk -v c="$coverage" 'BEGIN { if (c+0 < 60) { print "coverage below 60%"; exit 1 } }'

      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: ${{ env.GO_VERSION }}

  ts-ci:
    name: TypeScript CI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Lint
        run: pnpm exec eslint .

      - name: Test with coverage
        run: pnpm -r --if-present test

      - name: Audit (high+)
        run: pnpm audit --audit-level=high

      - name: Install osv-scanner
        run: |
          set -euo pipefail
          version=2.2.4
          curl -sSLf -o /tmp/osv-scanner "https://github.com/google/osv-scanner/releases/download/v${version}/osv-scanner_linux_amd64"
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: osv-scanner scan
        run: osv-scanner scan --lockfile=pnpm-lock.yaml ./

  sql-ci:
    name: SQL CI
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install sqlfluff
        run: pip install "sqlfluff==3.2.5"

      - name: Lint migrations
        run: |
          if compgen -G "deploy/migrations/*.sql" >/dev/null; then
            sqlfluff lint deploy/migrations
          else
            echo "no SQL migrations yet"
          fi

  migrate-ci:
    name: Migrate CI
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # POSTGRES_PASSWORD below is a throwaway value scoped to this service
    # container; it never touches a real database. AC8: no production
    # credentials in repo or logs.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      WATCHKEEPER_DB_URL: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install postgresql-client (pg_dump for round-trip)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Integration test (all migrate-* targets)
        run: scripts/test-migrate.sh

      - name: Schema smoke (migrate-test)
        run: make migrate-test

  keep-integration-ci:
    name: Keep Integration CI
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # POSTGRES_PASSWORD below is a throwaway value scoped to this service
    # container; it never touches a real database.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      KEEP_INTEGRATION_DB_URL: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
      WATCHKEEPER_DB_URL: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Apply Keep migrations
        run: make migrate-up

      - name: Run Keep integration tests
        run: make keep-integration-test

  docker-ci:
    name: Docker CI
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build watchkeeper image (deploy/Dockerfile)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: false
          tags: watchkeeper:ci

      - name: Build keep image (deploy/Dockerfile.keep)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: deploy/Dockerfile.keep
          push: false
          load: false
          tags: keep:ci

  security-ci:
    name: Security CI
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version=8.30.1
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks detect
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml --source .

      - name: Install go-licenses
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go license scan
        run: |
          go install github.com/google/go-licenses@v1.6.0
          go-licenses check ./... --disallowed_types=forbidden,restricted

      - name: Set up pnpm for license-checker
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TS license scan
        run: |
          allowed=$(tr '\n' ';' < .license-allowlist.txt | sed 's/;$//')
          pnpm dlx license-checker-rseidelsohn@4.3.0 --onlyAllow "$allowed" --excludePrivatePackages

  meta-ci:
    name: Meta CI
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: markdownlint
        run: pnpm exec markdownlint-cli2

      - name: yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          config_file: .yamllint.yml

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          if compgen -G "scripts/*.sh" >/dev/null; then
            shellcheck scripts/*.sh
          else
            echo "no shell scripts yet"
          fi

      - name: Lint PR title (commitlint)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | pnpm exec commitlint

      - name: Lint new commit messages (commitlint)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=50 origin "$BASE_REF"
          base=$(git merge-base "origin/$BASE_REF" "$HEAD_SHA")
          echo "Linting commits $base..$HEAD_SHA"
          pnpm exec commitlint --from="$base" --to="$HEAD_SHA"
